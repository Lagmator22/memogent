name: ci-python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        working-directory: python
        run: ruff check memogent tests
      - name: Unit tests
        working-directory: python
        run: pytest tests -v
      - name: KPI harness smoke
        working-directory: python
        run: python -m memogent.cli.main bench --n 2000 --cap 12 --output /tmp/bench.json || true
